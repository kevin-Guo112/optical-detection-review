<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>??????????</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" aria-label="????">
      <div class="brand">
        <div class="brand-mark">OD</div>
        <div>
          <h1>??????</h1>
          <p>???????</p>
        </div>
      </div>

      <nav class="tabs" aria-label="???">
        <button class="tab-button active" type="button" data-view="overview">???</button>
        <button class="tab-button" type="button" data-view="practice">??</button>
        <button class="tab-button" type="button" data-view="mistakes">??</button>
      </nav>

      <section class="filters" aria-label="??">
        <label for="chapterFilter">??</label>
        <select id="chapterFilter"></select>
        <label for="typeFilter">??</label>
        <select id="typeFilter"></select>
      </section>

      <section class="stats-panel" aria-label="????">
        <div>
          <span id="statTotal">0</span>
          <small>???</small>
        </div>
        <div>
          <span id="statDone">0</span>
          <small>??</small>
        </div>
        <div>
          <span id="statAccuracy">0%</span>
          <small>???</small>
        </div>
        <div>
          <span id="statMistakes">0</span>
          <small>??</small>
        </div>
      </section>

      <div class="sidebar-actions">
        <button class="ghost-button" type="button" id="resetProgressButton">????</button>
      </div>
    </aside>

    <main class="main-content">
      <section class="topbar" aria-label="????">
        <div>
          <p class="eyebrow">??????</p>
          <h2 id="pageTitle">??????????</h2>
          <p id="sourceText" class="source-text"></p>
        </div>
        <div class="quick-actions">
          <button class="icon-button" type="button" id="shuffleButton" title="????" aria-label="????">?</button>
          <button class="primary-button" type="button" id="startPracticeButton">????</button>
        </div>
      </section>

      <section id="overviewView" class="view active" aria-label="?????">
        <div class="section-header">
          <div>
            <h3>??????</h3>
            <p>????????????/??????????</p>
          </div>
          <div class="count-pill" id="chapterCount"></div>
        </div>
        <div id="chapterGrid" class="chapter-grid"></div>
      </section>

      <section id="practiceView" class="view" aria-label="????">
        <div class="practice-layout">
          <section class="question-panel" aria-live="polite">
            <div class="question-meta">
              <span id="questionType"></span>
              <span id="questionChapter"></span>
              <span id="questionProgress"></span>
            </div>
            <h3 id="questionPrompt"></h3>
            <div id="answerArea" class="answer-area"></div>
            <div id="feedback" class="feedback" hidden></div>
            <div class="practice-actions">
              <button class="ghost-button" type="button" id="prevButton">???</button>
              <button class="primary-button" type="button" id="checkButton">??/????</button>
              <button class="ghost-button" type="button" id="nextButton">???</button>
            </div>
          </section>

          <aside class="question-list-panel" aria-label="????">
            <div class="list-header">
              <h3>??</h3>
              <span id="filteredCount"></span>
            </div>
            <div id="questionList" class="question-list"></div>
          </aside>
        </div>
      </section>

      <section id="mistakesView" class="view" aria-label="????">
        <div class="section-header">
          <div>
            <h3>????</h3>
            <p>?????????????????????</p>
          </div>
          <button class="ghost-button" type="button" id="clearMistakesButton">????</button>
        </div>
        <div id="mistakeList" class="mistake-list"></div>
      </section>
    </main>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
